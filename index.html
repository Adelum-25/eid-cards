<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lines Cards Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* تصميم العناوين المزدوجة */
        .label-group { display: flex; justify-content: space-between; margin-top: 15px; margin-bottom: 5px; padding: 0 5%; font-size: 14px; font-weight: bold; }
        .en-text { font-family: 'Montserrat', sans-serif; color: #666; }

        select, input { width: 90%; padding: 12px; margin: 5px 0 15px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; font-family: 'Tajawal'; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        
        button { background-color: #111; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 17px; width: 95%; transition: 0.3s; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #333; transform: translateY(-2px); }
        
        canvas { max-width: 100%; height: auto; margin-top: 25px; border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #downloadBtn { background-color: #28a745; display: none; margin-top: 20px; }
        
        .footer-logo { margin-top: 20px; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">Eid Cards Generator</h2>
    <h3 style="color: #007bff; margin-top: 0;">مولد بطاقات العيد</h3>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="label-group">
        <span>1. اختر فرع الشركة:</span>
        <span class="en-text">1. Select Branch:</span>
    </div>
    <select id="branchSelect">
        <option value="lines_ideas.png">Lines Ideas</option>
        <option value="lines_supply.png">Lines Supply</option>
    </select>

    <div class="label-group">
        <span>2. اكتب اسمك:</span>
        <span class="en-text">2. Type your name:</span>
    </div>
    <input type="text" id="userName" placeholder="الاسم هنا... / Name here...">
    
    <button onclick="generateCard()">Create Card / إنشاء البطاقة ✨</button>
    
    <canvas id="cardCanvas"></canvas>
    
    <button id="downloadBtn" onclick="downloadCard()">Download Card / تحميل البطاقة 📥</button>

    <div class="footer-logo">Lines Ideas & Supply</div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');
    const branchSelect = document.getElementById('branchSelect');
    
    function generateCard() {
        const name = document.getElementById('userName').value;
        if (!name) { 
            alert("Please enter your name / لطفاً اكتب اسمك"); 
            return; 
        }

        const img = new Image();
        img.src = branchSelect.value; // سيأخذ الصورة بناءً على الفرع المختار

        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            // إعدادات الخط
            // إذا كان الاسم بالإنجليزية نستخدم خط Montserrat وإذا عربي نستخدم Tajawal
            const isEnglish = /^[A-Za-z\s]*$/.test(name);
            ctx.font = isEnglish ? 'bold 55px "Montserrat"' : 'bold 57px "Tajawal"';
            
            ctx.fillStyle = '#1a1a1a'; 
            ctx.textAlign = 'center';

            // ضبط مكان الاسم (يمكنك تعديل 0.75 حسب الحاجة)
            ctx.fillText(name, canvas.width * 0.51, canvas.height * 0.865); 

            canvas.style.display = 'block';
            downloadBtn.style.display = 'inline-block';
            window.scrollTo(0, document.body.scrollHeight);
        };
        
        img.onerror = function() {
            alert("Error: Image not found. / خطأ: لم يتم العثور على صورة البطاقة لهذا الفرع");
        };
    }

    function downloadCard() {
        const link = document.createElement('a');
        link.download = 'Lines_Card.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }
</script>

</body>
</html>
